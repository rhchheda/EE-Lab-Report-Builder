name: Sync Google Data

on:
  schedule:
    - cron: '30 3 * * *'   # ~9:00 AM IST daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --omit=dev

      - name: Generate drive-index.json
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: npm run sync-drive-index

      - name: Generate attendance-data.json
        env:
          GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
        run: npm run sync-attendance

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drive-index.json attendance-data.json
          git diff --cached --quiet || git commit -m "chore: sync drive-index.json + attendance-data.json"
          git push
